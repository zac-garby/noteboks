name = "noteboks"
grammar = "markdown"
path_suffixes = ["note", "article", "list", "index", "person"]
autoclose_before = "]"
brackets = [
    { start = "[[", end = "]]", close = true, newline = false },
    { start = "---", end = "---", close = false, newline = true },
]

[overrides.link]
word_characters = ["(", ")", " "]

[overrides.wiki_link]
word_characters = ["(", ")", " "]
